<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MUDE Foto</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --text: #f6f7fb;
      --muted: #a7adba;
      --accent: #ff7a00;
      --accent-2: #ffd166;
      --danger: #ff5d5d;
      --ok: #36c275;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at top, #1b2333, var(--bg) 45%);
      color: var(--text);
      font-family: Arial, sans-serif;
    }

    .app {
      min-height: 100%;
      padding: 16px;
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: 8px;
      max-width: 840px;
      margin: 0 auto;
    }

    .title {
      margin: 0;
      font-size: 24px;
      text-align: center;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.4;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 32px rgba(0, 0, 0, 0.35);
    }

    .stage video,
    .stage img.preview,
    .stage img.frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .stage img.frame {
      z-index: 2;
      pointer-events: none;
    }

    .stage img.preview {
      z-index: 1;
      display: none;
    }

    .stage .hint {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      z-index: 3;
      background: rgba(0, 0, 0, 0.55);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      color: #fff;
      white-space: nowrap;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      max-width: 340px;
      margin: 0 auto;
    }

    .mail-box {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .is-hidden {
      display: none !important;
    }

    label {
      font-size: 13px;
      color: var(--muted);
    }

    input[type="email"],
    input[type="text"],
    input[type="tel"] {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border-radius: 10px;
      padding: 12px;
      font-size: 16px;
      outline: none;
    }

    input[type="email"]:focus,
    input[type="text"]:focus,
    input[type="tel"]:focus {
      border-color: var(--accent-2);
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 12px 10px;
      font-size: 15px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.06s ease;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-start {
      background: #fff;
      color: #101010;
    }

    .btn-capture {
      background: var(--accent);
      color: #191919;
    }

    .btn-retake {
      background: #2f3542;
      color: #fff;
    }

    .btn-send {
      background: var(--ok);
      color: #0c1610;
    }

    .btn-again {
      background: #2f3542;
      color: #fff;
    }

    .status {
      min-height: 22px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }

    .status.error {
      color: var(--danger);
    }

    .status.ok {
      color: var(--ok);
    }

    .footer {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
    }

    .flash {
      position: absolute;
      inset: 0;
      background: #fff;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    .flash.active {
      animation: camFlash 260ms ease-out;
    }

    .stage img.preview.show {
      display: block;
      animation: shotZoom 520ms cubic-bezier(0.18, 0.7, 0.2, 1);
      transform-origin: center center;
    }

    @keyframes camFlash {
      0% { opacity: 0; }
      25% { opacity: 0.95; }
      100% { opacity: 0; }
    }

    @keyframes shotZoom {
      0% {
        transform: scale(0.88);
        opacity: 0.2;
      }
      65% {
        transform: scale(1.06);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @media (max-width: 900px) {
      .app {
        max-width: 720px;
      }
    }

    @media (max-width: 700px) {
      .app {
        padding: 12px;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .title {
        font-size: 22px;
      }

      .subtitle {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="title">Foto MUDE</h1>
    <p class="subtitle">
      Toma tu foto con el marco del MUDE y enviala por correo.
    </p>

    <section class="stage">
      <video id="video" autoplay playsinline muted></video>
      <img id="preview" class="preview" alt="Foto capturada" />
      <img id="frame" class="frame" src="./foto/mude.png" alt="Marco MUDE" />
      <div id="flash" class="flash"></div>
      <div class="hint">Marco horizontal 16:9</div>
    </section>

    <section class="controls">
      <button id="startBtn" class="btn-start" type="button">Activar camara</button>
      <button id="captureBtn" class="btn-capture is-hidden" type="button">Tomar foto</button>
      <button id="continueBtn" class="btn-send is-hidden" type="button">Enviar</button>
    </section>

    <div id="status" class="status"></div>

    <section id="mailBox" class="mail-box is-hidden">
      <div class="field-grid">
        <div class="field">
          <label for="nameInput">Nombre</label>
          <input id="nameInput" type="text" placeholder="Nombre del visitante" autocomplete="name" />
        </div>
        <div class="field">
          <label for="phoneInput">Telefono</label>
          <input id="phoneInput" type="tel" placeholder="8441234567" inputmode="tel" autocomplete="tel" />
        </div>
        <div class="field full">
          <label for="emailInput">Correo</label>
          <input id="emailInput" type="email" placeholder="correo@ejemplo.com" autocomplete="email" />
        </div>
      </div>
      <button id="sendBtn" class="btn-send" type="button" disabled>Enviar por correo y WhatsApp</button>
      <button id="againBtn" class="btn-again is-hidden" type="button">Tomar otra</button>
    </section>

    <p class="footer">Museo del Desierto (MUDE), Saltillo, Coahuila, Mexico.</p>
  </main>

  <canvas id="canvas" width="1920" height="1080" style="display:none;"></canvas>

  <script>
    const ENDPOINT_URL = "https://msj-573177942079.us-central1.run.app";

    const video = document.querySelector("#video");
    const preview = document.querySelector("#preview");
    const frame = document.querySelector("#frame");
    const flash = document.querySelector("#flash");
    const canvas = document.querySelector("#canvas");
    const statusEl = document.querySelector("#status");
    const mailBox = document.querySelector("#mailBox");

    const startBtn = document.querySelector("#startBtn");
    const captureBtn = document.querySelector("#captureBtn");
    const continueBtn = document.querySelector("#continueBtn");
    const sendBtn = document.querySelector("#sendBtn");
    const againBtn = document.querySelector("#againBtn");
    const nameInput = document.querySelector("#nameInput");
    const phoneInput = document.querySelector("#phoneInput");
    const emailInput = document.querySelector("#emailInput");

    let stream = null;
    let capturedDataUrl = "";

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function showStep(step) {
      startBtn.classList.add("is-hidden");
      captureBtn.classList.add("is-hidden");
      continueBtn.classList.add("is-hidden");

      if (step === "start") startBtn.classList.remove("is-hidden");
      if (step === "capture") captureBtn.classList.remove("is-hidden");
      if (step === "continue") continueBtn.classList.remove("is-hidden");
    }

    function isValidEmail(value) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
    }

    function isValidPhone(value) {
      const digits = value.replace(/\D/g, "");
      return digits.length >= 8;
    }

    function hasValidContactData() {
      const name = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const email = emailInput.value.trim();
      return !!name && isValidPhone(phone) && isValidEmail(email);
    }

    function syncSendState() {
      sendBtn.disabled = !(capturedDataUrl && hasValidContactData());
    }

    async function startCamera() {
      try {
        setStatus("Solicitando permiso de camara...");
        if (stream) {
          showStep("capture");
          setStatus("Camara lista. Presiona 'Tomar foto'.");
          return;
        }
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });
        video.srcObject = stream;
        await video.play();

        setStatus("Camara lista. Presiona 'Tomar foto'.");
        showStep("capture");
      } catch (err) {
        console.error(err);
        setStatus("No se pudo abrir la camara. Revisa permisos.", "error");
      }
    }

    function drawCover(sourceWidth, sourceHeight, destWidth, destHeight, drawFn) {
      const scale = Math.max(destWidth / sourceWidth, destHeight / sourceHeight);
      const drawWidth = sourceWidth * scale;
      const drawHeight = sourceHeight * scale;
      const dx = (destWidth - drawWidth) / 2;
      const dy = (destHeight - drawHeight) / 2;
      drawFn(dx, dy, drawWidth, drawHeight);
    }

    function capturePhoto() {
      if (!video.videoWidth || !video.videoHeight) {
        setStatus("La camara aun no esta lista.", "error");
        return;
      }

      const ctx = canvas.getContext("2d");
      canvas.width = 1920;
      canvas.height = 1080;

      drawCover(video.videoWidth, video.videoHeight, canvas.width, canvas.height, (dx, dy, dw, dh) => {
        ctx.drawImage(video, dx, dy, dw, dh);
      });

      // Agrega el marco MUDE directamente en la foto final.
      ctx.drawImage(frame, 0, 0, canvas.width, canvas.height);

      capturedDataUrl = canvas.toDataURL("image/jpeg", 0.92);
      preview.src = capturedDataUrl;
      preview.classList.remove("show");
      preview.style.display = "block";
      void preview.offsetWidth;
      preview.classList.add("show");
      video.style.display = "none";

      // Flash de camara.
      flash.classList.remove("active");
      void flash.offsetWidth;
      flash.classList.add("active");

      showStep("continue");
      setStatus("Foto capturada. Presiona 'Enviar' para continuar.");
    }

    function continueToForm() {
      if (!capturedDataUrl) {
        setStatus("Primero toma una foto.", "error");
        return;
      }
      continueBtn.classList.add("is-hidden");
      mailBox.classList.remove("is-hidden");
      againBtn.classList.add("is-hidden");
      syncSendState();
      nameInput.focus();
      setStatus("Completa nombre, telefono y correo para enviar por correo y WhatsApp.");
    }

    function resetForAnotherPhoto() {
      capturedDataUrl = "";
      preview.src = "";
      preview.style.display = "none";
      preview.classList.remove("show");
      video.style.display = "block";

      nameInput.value = "";
      phoneInput.value = "";
      emailInput.value = "";

      mailBox.classList.add("is-hidden");
      againBtn.classList.add("is-hidden");
      sendBtn.disabled = true;

      if (stream) {
        showStep("capture");
        setStatus("Listo. Presiona 'Tomar foto' para una nueva captura.");
      } else {
        showStep("start");
        setStatus("Paso 1: activa la camara.");
      }
    }

    function buildMudeMessage(name, phone, email) {
      return [
        `Hola ${name},`,
        "",
        "Gracias por tu visita al Museo del Desierto (MUDE).",
        "",
        "Te compartimos tu fotografia tomada en MUDE, Saltillo, Coahuila, Mexico.",
        "",
        `Telefono registrado: ${phone}`,
        `Correo registrado: ${email}`,
        "",
        "Esperamos verte pronto."
      ].join("\n");
    }

    function dataUrlToBase64(dataUrl) {
      return dataUrl.replace(/^data:image\/[a-zA-Z0-9+.-]+;base64,/, "");
    }

    async function sendPhoto() {
      const name = nameInput.value.trim();
      const phone = phoneInput.value.trim();
      const email = emailInput.value.trim();
      if (!name) {
        setStatus("Ingresa el nombre.", "error");
        return;
      }
      if (!isValidPhone(phone)) {
        setStatus("Ingresa un telefono valido (minimo 8 digitos).", "error");
        return;
      }
      if (!isValidEmail(email)) {
        setStatus("Ingresa un correo valido.", "error");
        return;
      }
      if (!capturedDataUrl) {
        setStatus("Primero toma una foto.", "error");
        return;
      }

      sendBtn.disabled = true;
      setStatus("Enviando correo y WhatsApp...");

      const payload = {
        name,
        phone,
        email,
        subject: `Tu foto del MUDE, ${name}`,
        message: buildMudeMessage(name, phone, email),
        imageBase64: dataUrlToBase64(capturedDataUrl),
        imageMimeType: "image/jpeg",
        imageFilename: "foto-mude.jpg"
      };

      try {
        const response = await fetch(ENDPOINT_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || "No se pudo enviar el correo.");
        }

        setStatus("Foto enviada por correo y WhatsApp.", "ok");
        sendBtn.disabled = true;
        againBtn.classList.remove("is-hidden");
      } catch (err) {
        console.error(err);
        setStatus(err.message || "Error al enviar la foto.", "error");
      } finally {
        if (againBtn.classList.contains("is-hidden")) {
          syncSendState();
        }
      }
    }

    showStep("start");
    setStatus("Paso 1: activa la camara.");

    startBtn.addEventListener("click", startCamera);
    captureBtn.addEventListener("click", capturePhoto);
    continueBtn.addEventListener("click", continueToForm);
    sendBtn.addEventListener("click", sendPhoto);
    againBtn.addEventListener("click", resetForAnotherPhoto);
    [nameInput, phoneInput, emailInput].forEach((input) => {
      input.addEventListener("input", syncSendState);
    });

    window.addEventListener("beforeunload", () => {
      if (stream) {
        stream.getTracks().forEach((track) => track.stop());
      }
    });
  </script>
</body>
</html>
