<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Visor 3D MUDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <style>
      :root {
        --earth-600: #8b5a2b;
        --earth-700: #6b4421;
        --green-500: #2f9e58;
        --blue-700: #23425f;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Manrope", sans-serif;
        background: #120d09;
      }

      model-viewer {
        width: 100vw;
        height: 100vh;
        background:
          radial-gradient(circle at 50% 30%, rgba(139, 90, 43, 0.18), transparent 24%),
          radial-gradient(circle at center, #28170c, #080503 72%);
        --poster-color: transparent;
      }

      .message {
        position: fixed;
        top: 1rem;
        left: 1rem;
        right: 1rem;
        z-index: 20;
        padding: 0.9rem 1rem;
        border-radius: 1rem;
        color: white;
        text-align: center;
        background: rgba(20, 14, 10, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
      }

      .message strong {
        display: block;
        margin-bottom: 0.2rem;
      }

      .loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 18;
        display: grid;
        place-items: center;
        background: rgba(8, 5, 3, 0.32);
        backdrop-filter: blur(4px);
        transition: opacity 180ms ease;
      }

      .loading-overlay.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      .loading-box {
        display: grid;
        gap: 0.75rem;
        justify-items: center;
        padding: 1rem 1.2rem;
        border-radius: 1.2rem;
        background: rgba(20, 14, 10, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: white;
      }

      .loading-box p {
        margin: 0;
        font-size: 0.92rem;
      }

      .spinner {
        width: 2.6rem;
        height: 2.6rem;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.22);
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
      }

      .viewer-brand {
        position: fixed;
        top: 5.8rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        width: min(36vw, 9rem);
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      .viewer-brand img {
        width: 100%;
        height: auto;
        display: block;
      }

      .viewer-actions {
        position: fixed;
        left: 50%;
        bottom: 1.2rem;
        transform: translateX(-50%);
        z-index: 20;
        width: min(22rem, calc(100vw - 2rem));
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .action-button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 1rem 1.2rem;
        font-size: 0.95rem;
        font-weight: 800;
        font-family: "Manrope", sans-serif;
        cursor: pointer;
      }

      .primary-button {
        color: white;
        background: linear-gradient(135deg, var(--earth-600), var(--earth-700));
        box-shadow: 0 16px 30px rgba(107, 68, 33, 0.3);
      }

      .map-button {
        color: white;
        background: linear-gradient(135deg, #3c5874, var(--blue-700));
        box-shadow: 0 16px 30px rgba(35, 66, 95, 0.28);
      }

      .stamp-button {
        color: white;
        background: linear-gradient(135deg, var(--green-500), #1d8d49);
        box-shadow: 0 16px 30px rgba(29, 141, 73, 0.28);
      }

      .close-button {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 25;
        width: 3rem;
        height: 3rem;
        border: 0;
        border-radius: 50%;
        color: #2f241c;
        font-size: 1.35rem;
        background: rgba(255, 250, 244, 0.92);
        box-shadow: 0 16px 30px rgba(18, 13, 9, 0.18);
        cursor: pointer;
      }

      .is-hidden {
        display: none !important;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 520px) {
        .viewer-brand {
          top: 6.1rem;
          width: min(46vw, 8rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="message">
      <strong id="viewerTitle">MUDE</strong>
      <span id="messageText">Explora el modelo 3D y usa AR para verlo en tu entorno.</span>
    </div>

    <button id="closeBtn" class="close-button" type="button" aria-label="Cerrar visor">
      ×
    </button>

    <div class="viewer-brand">
      <img src="./assets/ar/images/mude.png" alt="MUDE" />
    </div>

    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <p>Cargando modelo 3D...</p>
      </div>
    </div>

    <model-viewer
      id="viewer"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      environment-image="neutral"
      orientation="0deg 0deg 0deg"
      camera-orbit="0deg 78deg 105%"
      camera-target="0m 0.45m 0m"
      scale="2 2 2"
    ></model-viewer>

    <div class="viewer-actions">
      <button id="arBtn" class="action-button primary-button" type="button">Ver en AR</button>
      <button id="mapBtn" class="action-button map-button is-hidden" type="button">¿Cómo llegar?</button>
      <button id="stampBtn" class="action-button stamp-button is-hidden" type="button">Obtener sello</button>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const pavilionId = Number(params.get("pavilionId") || "1");
      const pavilionName = params.get("name") || "Dinosaurio MUDE";
      const MODEL_URL = params.get("modelSrc") || "./assets/ar/models/modelo.glb";
      const IOS_MODEL_URL = params.get("iosSrc") || "./assets/ar/models/modelo2.usdz";
      const MAP_URL = params.get("mapUrl") || "";

      document.title = `Visor 3D ${pavilionName}`;

      const messageText = document.querySelector("#messageText");
      const viewerTitle = document.querySelector("#viewerTitle");
      const viewer = document.querySelector("#viewer");
      const arBtn = document.querySelector("#arBtn");
      const mapBtn = document.querySelector("#mapBtn");
      const stampBtn = document.querySelector("#stampBtn");
      const closeBtn = document.querySelector("#closeBtn");
      const loadingOverlay = document.querySelector("#loadingOverlay");
      const dinoAudio = new Audio("./assets/ar/audio/dino.mp3");

      dinoAudio.loop = true;
      dinoAudio.preload = "auto";

      viewerTitle.textContent = pavilionName;
      viewer.setAttribute("src", MODEL_URL);

      if (IOS_MODEL_URL) {
        viewer.setAttribute("ios-src", IOS_MODEL_URL);
      }

      if (MAP_URL) {
        mapBtn.classList.remove("is-hidden");
        stampBtn.classList.remove("is-hidden");
      }

      function setMessage(text) {
        messageText.textContent = text;
      }

      function hideLoader() {
        loadingOverlay.classList.add("is-hidden");
      }

      function playAudioSafe() {
        dinoAudio.play().catch(() => {});
      }

      viewer.addEventListener("load", hideLoader);
      viewer.addEventListener("error", hideLoader);

      viewer.addEventListener("ar-status", (event) => {
        const status = event.detail.status;

        if (status === "session-started") {
          setMessage("AR activa. Coloca el modelo en tu entorno.");
          playAudioSafe();
          return;
        }

        if (status === "not-presenting") {
          setMessage("Explora el modelo 3D o vuelve a abrir AR.");
        }

        dinoAudio.pause();
        dinoAudio.currentTime = 0;
      });

      arBtn.addEventListener("click", playAudioSafe);
      arBtn.addEventListener("click", () => viewer.activateAR());

      mapBtn.addEventListener("click", () => {
        if (!MAP_URL) {
          return;
        }

        window.open(MAP_URL, "_blank", "noopener,noreferrer");
      });

      stampBtn.addEventListener("click", () => {
        window.parent.postMessage(
          { type: "mude-ar-stamp-earned", pavilionId },
          window.location.origin
        );
      });

      closeBtn.addEventListener("click", () => {
        window.parent.postMessage(
          { type: "mude-close-viewer" },
          window.location.origin
        );
      });

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          dinoAudio.pause();
        }
      });
    </script>
  </body>
</html>
