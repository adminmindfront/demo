<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Visor 3D MUDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <script
      type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"
    ></script>
    <style>
      :root {
        --earth-600: #8b5a2b;
        --earth-700: #6b4421;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Manrope", sans-serif;
        background: #120d09;
      }

      model-viewer {
        width: 100vw;
        height: 100vh;
        background:
          radial-gradient(circle at 50% 30%, rgba(139, 90, 43, 0.18), transparent 24%),
          radial-gradient(circle at center, #28170c, #080503 72%);
        --poster-color: transparent;
      }

      .message {
        position: fixed;
        top: 1rem;
        left: 1rem;
        right: 1rem;
        z-index: 20;
        padding: 0.9rem 1rem;
        border-radius: 1rem;
        color: white;
        text-align: center;
        background: rgba(20, 14, 10, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
      }

      .message strong {
        display: block;
        margin-bottom: 0.2rem;
      }

      .viewer-brand {
        position: fixed;
        top: 5.8rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        width: min(36vw, 9rem);
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      .viewer-brand img {
        width: 100%;
        height: auto;
        display: block;
      }

      .viewer-actions {
        position: fixed;
        left: 50%;
        bottom: 1.2rem;
        transform: translateX(-50%);
        z-index: 20;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .action-button {
        border: 0;
        border-radius: 999px;
        padding: 1rem 1.2rem;
        font-size: 0.95rem;
        font-weight: 800;
        font-family: "Manrope", sans-serif;
        cursor: pointer;
      }

      #arBtn {
        color: white;
        background: linear-gradient(135deg, var(--earth-600), var(--earth-700));
        box-shadow: 0 16px 30px rgba(107, 68, 33, 0.3);
      }

      .close-button {
        color: #2f241c;
        background: rgba(255, 250, 244, 0.92);
        box-shadow: 0 16px 30px rgba(18, 13, 9, 0.18);
      }

      @media (max-width: 520px) {
        .viewer-brand {
          top: 6.1rem;
          width: min(46vw, 8rem);
        }

        .viewer-actions {
          width: calc(100vw - 2rem);
        }

        .action-button {
          flex: 1;
          padding-inline: 0.95rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="message">
      <strong>Dinosaurio MUDE</strong>
      <span id="messageText">Explora el modelo 3D y usa AR para verlo en tu entorno.</span>
    </div>

    <div class="viewer-brand">
      <img src="./assets/ar/images/mude.png" alt="MUDE" />
    </div>

    <model-viewer
      id="viewer"
      src="./assets/ar/models/modelo.glb"
      ios-src="./assets/ar/models/modelo2.usdz"
      ar
      ar-modes="webxr scene-viewer quick-look"
      ar-placement="floor"
      camera-controls
      touch-action="pan-y"
      shadow-intensity="1"
      environment-image="neutral"
      orientation="0deg 0deg 0deg"
      camera-orbit="0deg 78deg 105%"
      camera-target="0m 0.45m 0m"
      scale="2 2 2"
    ></model-viewer>

    <div class="viewer-actions">
      <button id="arBtn" class="action-button" type="button">Ver en AR</button>
      <button id="closeBtn" class="action-button close-button" type="button">Cerrar</button>
    </div>

    <script>
      const messageText = document.querySelector("#messageText");
      const viewer = document.querySelector("#viewer");
      const arBtn = document.querySelector("#arBtn");
      const closeBtn = document.querySelector("#closeBtn");
      const dinoAudio = new Audio("./assets/ar/audio/dino.mp3");

      dinoAudio.loop = true;
      dinoAudio.preload = "auto";

      function setMessage(text) {
        messageText.textContent = text;
      }

      function playAudioSafe() {
        dinoAudio.play().catch(() => {});
      }

      viewer.addEventListener("ar-status", (event) => {
        const status = event.detail.status;

        if (status === "session-started") {
          setMessage("AR activa. Coloca el dinosaurio en tu entorno.");
          playAudioSafe();
          return;
        }

        if (status === "not-presenting") {
          setMessage("Explora el modelo 3D o vuelve a abrir AR.");
        }

        dinoAudio.pause();
        dinoAudio.currentTime = 0;
      });

      arBtn.addEventListener("click", playAudioSafe);
      arBtn.addEventListener("click", () => viewer.activateAR());
      closeBtn.addEventListener("click", () => {
        window.parent.postMessage(
          { type: "mude-close-viewer" },
          window.location.origin
        );
      });
      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          dinoAudio.pause();
        }
      });
    </script>
  </body>
</html>
