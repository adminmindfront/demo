<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visita Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Noto+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2308161f'/%3E%3Ccircle cx='32' cy='32' r='18' fill='%2347a8ff'/%3E%3Cpath d='M32 18l4.8 9.7 10.7 1.6-7.7 7.5 1.8 10.6L32 42.2l-9.6 5 1.8-10.6-7.7-7.5 10.7-1.6z' fill='%23f6eddc'/%3E%3C/svg%3E"
    />
    <script
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.8/dist/dotlottie-wc.js"
      type="module"
    ></script>
    <link rel="stylesheet" href="./assets/css/visita.css" />
  </head>
  <body>
    <div class="language-gate" id="languageGate">
      <section class="language-card">
        <div class="language-card__head">
          <div>
            <div class="language-card__eyebrow">Global travel</div>
            <h1 id="languageTitle"></h1>
            <p id="languageHint"></p>
          </div>
          <button class="language-card__close" id="languageCloseBtn" type="button" aria-label="Close">&times;</button>
        </div>
        <div class="language-current" id="languageCurrent"></div>
        <div class="language-picker">
          <label class="language-select__field">
            <span id="languageSelectLabel"></span>
            <select id="languageSelect"></select>
          </label>
          <div class="language-card__actions">
            <button class="action-button action-button--primary" id="languageContinueBtn" type="button"></button>
          </div>
        </div>
      </section>
    </div>

    <div class="auth-gate" id="authGate">
      <section class="auth-card">
        <div class="auth-card__copy">
          <span class="auth-card__eyebrow" id="authEyebrow"></span>
          <h2 id="authTitle"></h2>
          <p id="authSubtitle"></p>
          <div class="auth-card__bullets" id="authBullets"></div>
        </div>

        <div class="auth-card__form">
          <div class="auth-feedback auth-feedback--success" id="authMessage"></div>
          <div class="auth-feedback auth-feedback--error" id="authError"></div>

          <button class="action-button auth-google" id="authGoogleBtn" type="button"></button>
          <div class="auth-divider" id="authDivider"></div>

          <div class="auth-toggle">
            <button class="tiny-button is-active" id="authLoginModeBtn" type="button"></button>
            <button class="tiny-button" id="authSignupModeBtn" type="button"></button>
          </div>

          <form class="auth-form" id="authForm">
            <label class="auth-field" id="authNameField">
              <span id="authNameLabel"></span>
              <input id="authNameInput" type="text" autocomplete="name" />
            </label>

            <label class="auth-field">
              <span id="authEmailLabel"></span>
              <input id="authEmailInput" type="email" autocomplete="email" required />
            </label>

            <label class="auth-field">
              <span id="authPasswordLabel"></span>
              <input id="authPasswordInput" type="password" autocomplete="current-password" required />
            </label>

            <button class="action-button action-button--primary auth-submit" id="authSubmitBtn" type="submit"></button>
          </form>
          <p class="auth-legal" id="authLegal"></p>
        </div>
      </section>
    </div>

    <div class="shell">
      <header class="topbar">
        <div class="brand brand--compact">
          <div class="brand__badge">AI</div>
          <div class="brand__meta">
            <strong id="brandTitle"></strong>
            <span id="brandSubtitle"></span>
          </div>
        </div>

        <div class="topbar__actions">
          <div class="weather-compact" id="weatherCompact"></div>
          <button class="flag-button" id="languageQuickBtn" type="button" aria-label="Language"></button>
          <button class="menu-button" id="menuToggleBtn" type="button" aria-label="Menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
        </div>
      </header>

      <aside class="menu-drawer" id="menuDrawer" aria-hidden="true">
        <div class="menu-drawer__head">
          <strong id="menuTitle">Menu</strong>
          <button class="menu-drawer__close" id="menuCloseBtn" type="button" aria-label="Close">&times;</button>
        </div>
        <div class="account-pill account-pill--menu" id="accountPill"></div>
        <button class="menu-item" id="changeLanguageBtn" type="button"></button>
        <button class="menu-item" id="authLogoutBtn" type="button"></button>
      </aside>
      <button class="menu-backdrop" id="menuBackdrop" type="button" aria-label="Close menu"></button>

      <nav class="section-nav" id="sectionNav" aria-label="Sections">
        <button class="section-nav__btn" id="assistantSectionBtn" type="button" data-section-switch="assistant" title="Asistente IA" aria-label="Asistente IA">
          <img src="./assets/img/bot.png" alt="" />
        </button>
        <button class="section-nav__btn" id="mapSectionBtn" type="button" data-section-switch="map" title="Mapa y trayectos" aria-label="Mapa y trayectos">
          <img src="./assets/img/ubicaciones.png" alt="" />
        </button>
        <button class="section-nav__btn" id="nearbySectionBtn" type="button" data-section-switch="nearby" title="Actividades sugeridas" aria-label="Actividades sugeridas">
          <img src="./assets/img/actividad.png" alt="" />
        </button>
        <button class="section-nav__btn" id="planSectionBtn" type="button" data-section-switch="plan" title="Plan viajero" aria-label="Plan viajero">
          <img src="./assets/img/plan.png" alt="" />
        </button>
      </nav>

      <section class="hero hero--compact">
        <div class="hero__copy">
          <div class="hero__eyebrow" id="heroEyebrow"></div>
          <h1 class="hero__title" id="heroTitle"></h1>
          <p class="hero__subtitle" id="heroSubtitle"></p>
        </div>
        <button class="action-button action-button--primary hero__cta" id="suggestionBtn" type="button"></button>
        <article class="hero__suggestion hero__suggestion--compact" id="heroSuggestionCard" hidden>
          <h2 id="suggestionHeading"></h2>
          <p id="suggestionText"></p>
          <div class="hero__suggestion-actions">
            <button class="action-button action-button--primary" id="acceptSuggestionBtn" type="button"></button>
            <button class="action-button" id="rejectSuggestionBtn" type="button"></button>
          </div>
        </article>
        <div class="hero__pills hero__pills--hidden" aria-hidden="true">
          <div class="hero-pill" id="locationPill"></div>
          <div class="hero-pill" id="weatherPill"></div>
          <div class="hero-pill" id="planPill"></div>
        </div>
        <div class="hero__stack hero__stack--hidden" aria-hidden="true">
          <article class="hero-note">
            <strong id="assistantPreviewHeading"></strong>
            <span id="assistantPreviewText"></span>
          </article>
          <article class="hero-note">
            <strong id="keysHeading"></strong>
            <span id="keysText"></span>
          </article>
        </div>
      </section>

      <main class="layout">
        <div class="main-column">
          <section class="panel accordion-panel system-context" id="overviewAccordion">
            <button class="accordion-toggle" type="button" data-accordion-toggle="overview">
              <div>
                <strong id="overviewAccordionTitle"></strong>
                <span id="overviewAccordionHint"></span>
              </div>
              <span class="accordion-toggle__icon" id="overviewAccordionIcon">+</span>
            </button>
            <div class="accordion-body" id="overviewAccordionBody">
              <section class="summary-grid">
                <article class="panel summary-card">
                  <div class="summary-card__label" id="locationCardLabel"></div>
                  <div class="summary-card__value" id="locationCardValue"></div>
                  <div class="summary-card__hint" id="locationCardHint"></div>
                </article>

                <article class="panel summary-card">
                  <div class="summary-card__label" id="weatherCardLabel"></div>
                  <div class="summary-card__value" id="weatherCardValue"></div>
                  <div class="summary-card__hint" id="weatherCardHint"></div>
                </article>

                <article class="panel summary-card">
                  <div class="summary-card__label" id="timingCardLabel"></div>
                  <div class="summary-card__value" id="timingCardValue"></div>
                  <div class="summary-card__hint" id="timingCardHint"></div>
                </article>
              </section>
            </div>
          </section>

          <aside class="assistant assistant-column section-panel" id="assistantPanel" data-section-panel="assistant">
            <div class="assistant__head sr-only">
              <div>
                <h2 class="assistant__title" id="assistantTitle"></h2>
                <p class="assistant__subtitle" id="assistantSubtitle"></p>
              </div>
            </div>

            <div class="assistant__controls legacy-hidden">
              <button class="action-button action-button--primary" id="connectBtn" type="button"></button>
              <button class="action-button" id="disconnectBtn" type="button"></button>
              <button class="action-button" id="contextBtn" type="button"></button>
            </div>

            <div class="assistant__toggles legacy-hidden">
              <button class="tiny-button" id="micBtn" type="button"></button>
              <button class="tiny-button" id="voiceBtn" type="button"></button>
            </div>

            <div class="assistant__status legacy-hidden">
              <div class="status-pill" id="connectionStatus">
                <span class="status-pill__dot"></span>
                <span id="connectionStatusText"></span>
              </div>
              <div class="status-pill" id="locationStatus">
                <span class="status-pill__dot"></span>
                <span id="locationStatusText"></span>
              </div>
            </div>

            <div class="assistant__notice" id="assistantNotice"></div>

            <div class="assistant-toolbar">
              <div class="chat-menu" id="chatMenu">
                <button class="tiny-button chat-menu__trigger" id="chatMenuBtn" type="button" aria-expanded="false" aria-label="Chats">
                  <span></span>
                  <span></span>
                  <span></span>
                </button>
                <div class="chat-menu__panel" id="chatMenuPanel" hidden>
                  <button class="tiny-button chat-menu__new" id="chatMenuNewBtn" type="button"></button>
                  <div class="thread-list" id="threadList"></div>
                </div>
              </div>

              <div class="assistant-mode" id="assistantModeTabs">
                <button class="tiny-button" id="voiceModeBtn" type="button" data-assistant-mode="voice"></button>
                <button class="tiny-button" id="textModeBtn" type="button" data-assistant-mode="text"></button>
              </div>
            </div>

            <section class="assistant-voice-pane" id="assistantVoicePane">
              <div class="voice-visual" id="voiceVisual">
                <dotlottie-wc
                  src="https://lottie.host/be7fe30e-a691-40a0-bdf9-5e175b47240a/yisXA4hHrg.lottie"
                  style="width: 300px; height: 300px"
                  autoplay
                  loop
                ></dotlottie-wc>
              </div>
              <div class="voice-copy">
                <strong id="voiceVisualizerTitle"></strong>
                <p id="voiceVisualizerHint"></p>
              </div>
              <button class="action-button action-button--primary voice-action" id="voiceSessionBtn" type="button"></button>
            </section>

            <section class="assistant-text-pane" id="assistantTextPane">
              <div class="chat-quick legacy-hidden" id="quickPrompts"></div>
              <div class="chat-shell">
                <div class="chat-log" id="chatLog"></div>

                <form class="chat-form" id="chatForm">
                  <textarea id="chatInput"></textarea>
                  <button class="action-button action-button--warm" type="submit" id="sendBtn"></button>
                </form>
              </div>
            </section>
          </aside>

          <section class="panel accordion-panel section-panel" id="mapAccordion" data-section-panel="map">
            <button class="accordion-toggle legacy-hidden" type="button" data-accordion-toggle="map">
              <div>
                <strong id="mapAccordionTitle"></strong>
                <span id="mapAccordionHint"></span>
              </div>
              <span class="accordion-toggle__icon" id="mapAccordionIcon">+</span>
            </button>
            <div class="accordion-body" id="mapAccordionBody">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title" id="mapTitle"></h2>
                  <p class="panel__subtitle" id="mapSubtitle"></p>
                </div>
                <div class="mode-group" id="travelModeGroup"></div>
              </div>
              <div class="map-wrap">
                <div id="mapCanvas" class="map-empty"></div>
              </div>
            </div>
          </section>

          <section class="panel accordion-panel section-panel" id="nearbyAccordion" data-section-panel="nearby">
            <button class="accordion-toggle legacy-hidden" type="button" data-accordion-toggle="nearby">
              <div>
                <strong id="nearbyAccordionTitle"></strong>
                <span id="nearbyAccordionHint"></span>
              </div>
              <span class="accordion-toggle__icon" id="nearbyAccordionIcon">+</span>
            </button>
            <div class="accordion-body" id="nearbyAccordionBody">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title" id="nearbyTitle"></h2>
                  <p class="panel__subtitle" id="nearbySubtitle"></p>
                </div>
              </div>
              <div class="filter-row" id="nearbyFilterRow"></div>
              <div class="recommendation-grid" id="nearbyGrid"></div>
            </div>
          </section>

          <section class="panel accordion-panel section-panel" id="planAccordion" data-section-panel="plan">
            <button class="accordion-toggle legacy-hidden" type="button" data-accordion-toggle="plan">
              <div>
                <strong id="planAccordionTitle"></strong>
                <span id="planAccordionHint"></span>
              </div>
              <span class="accordion-toggle__icon" id="planAccordionIcon">+</span>
            </button>
            <div class="accordion-body" id="planAccordionBody">
              <div class="panel__head">
                <div>
                  <h2 class="panel__title" id="planTitle"></h2>
                  <p class="panel__subtitle" id="planSubtitle"></p>
                </div>
              </div>
              <div class="plan-switcher" id="planWorkspaceTabs">
                <button class="tiny-button" id="draftPlanTabBtn" type="button" data-plan-workspace="draft"></button>
                <button class="tiny-button" id="savedPlansTabBtn" type="button" data-plan-workspace="saved"></button>
              </div>

              <section class="plan-workspace" id="draftPlanWorkspace">
                <div class="plan-grid" id="planGrid"></div>
                <div class="plan-actions">
                  <button class="action-button action-button--primary" id="openPlanBuilderBtn" type="button"></button>
                </div>
                <div class="generated-plan" id="generatedPlan"></div>
              </section>

              <section class="plan-workspace" id="savedPlansWorkspace" hidden>
                <div class="saved-plans-list" id="savedPlansList"></div>
              </section>
            </div>
          </section>
        </div>
      </main>
    </div>

    <div class="plan-builder-sheet" id="planBuilderSheet">
      <section class="plan-builder-card">
        <div class="plan-builder-card__head">
          <div>
            <strong id="planBuilderTitle"></strong>
            <span id="planBuilderHint"></span>
          </div>
          <button class="plan-builder-card__close" id="planBuilderCloseBtn" type="button" aria-label="Close">&times;</button>
        </div>

        <form class="plan-builder-form" id="planBuilderForm">
          <label class="auth-field">
            <span id="planNameLabel"></span>
            <input id="planNameInput" type="text" maxlength="80" />
          </label>
          <label class="auth-field">
            <span id="planDateLabel"></span>
            <input id="planDateInput" type="date" required />
          </label>
          <label class="auth-field">
            <span id="planStartTimeLabel"></span>
            <input id="planStartTimeInput" type="time" required />
          </label>
          <label class="auth-field">
            <span id="planTravelModeLabel"></span>
            <select id="planTravelModeInput" required></select>
          </label>
          <div class="plan-builder-form__actions">
            <button class="action-button" id="planBuilderCancelBtn" type="button"></button>
            <button class="action-button action-button--primary" id="planBuilderSubmitBtn" type="submit"></button>
          </div>
        </form>
      </section>
    </div>

    <button class="legacy-hidden" id="locateBtn" type="button"></button>
    <button class="legacy-hidden" id="refreshBtn" type="button"></button>

    <audio id="remoteAudio" autoplay></audio>

    <script type="module" src="./assets/js/visita.js"></script>
  </body>
</html>
