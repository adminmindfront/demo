<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Escaner AR MUDE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Manrope:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
        }
      }
    </script>

    <style>
      :root {
        --earth-600: #8b5a2b;
        --earth-700: #6b4421;
        --green-500: #2f9e58;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Manrope", sans-serif;
        background: #000;
      }

      #container {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      #container video,
      #container canvas {
        position: absolute !important;
        inset: 0 !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }

      #container video {
        z-index: 1 !important;
      }

      #container canvas {
        z-index: 2 !important;
        background: transparent !important;
      }

      .hud {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
      }

      .start-gate {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: grid;
        place-items: center;
        padding: 1.25rem;
        background:
          radial-gradient(circle at top, rgba(139, 90, 43, 0.18), transparent 28%),
          rgba(6, 4, 3, 0.84);
      }

      .start-gate.is-hidden {
        display: none;
      }

      .start-gate__card {
        width: min(100%, 23rem);
        padding: 1.25rem;
        border-radius: 1.5rem;
        text-align: center;
        color: white;
        background: rgba(20, 14, 10, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(10px);
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      .start-gate__card h1 {
        margin: 0 0 0.55rem;
        font-size: 1.45rem;
        font-family: "Cormorant Garamond", serif;
      }

      .start-gate__card p {
        margin: 0 0 1rem;
        color: rgba(255, 255, 255, 0.82);
        line-height: 1.45;
      }

      .start-gate__button {
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 1rem 1.25rem;
        color: white;
        font-size: 1rem;
        font-weight: 800;
        font-family: "Manrope", sans-serif;
        background: linear-gradient(135deg, var(--earth-600), var(--earth-700));
        box-shadow: 0 18px 40px rgba(107, 68, 33, 0.3);
        cursor: pointer;
      }

      .start-gate__button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      .message {
        position: absolute;
        top: 1rem;
        left: 1rem;
        right: 1rem;
        padding: 0.9rem 1rem;
        border-radius: 1rem;
        background: rgba(20, 14, 10, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: white;
        text-align: center;
        backdrop-filter: blur(8px);
      }

      .message.is-hidden,
      .frame.is-hidden {
        display: none !important;
      }

      .message strong {
        display: block;
        margin-bottom: 0.2rem;
      }

      .controls {
        position: absolute;
        left: 1rem;
        right: 1rem;
        bottom: 1.2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.8rem;
        pointer-events: auto;
      }

      .action-button {
        min-width: min(18rem, 100%);
        max-width: min(22rem, 100%);
        padding: 1rem 1.4rem;
        border: 0;
        border-radius: 999px;
        color: white;
        font-size: 1rem;
        font-weight: 800;
        font-family: "Manrope", sans-serif;
        display: none;
        cursor: pointer;
      }

      .action-button.is-visible {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .stamp-button {
        background: linear-gradient(135deg, var(--green-500), #1d8d49);
        box-shadow: 0 18px 40px rgba(29, 141, 73, 0.32);
      }

      .map-button {
        background: linear-gradient(135deg, #3c5874, #23425f);
        box-shadow: 0 18px 40px rgba(35, 66, 95, 0.32);
      }

      .frame {
        position: absolute;
        top: 50%;
        left: 50%;
        width: min(72vw, 18rem);
        height: min(72vw, 18rem);
        transform: translate(-50%, -50%);
        border-radius: 2rem;
        border: 2px dashed rgba(255, 255, 255, 0.45);
        box-shadow: inset 0 0 0 1px rgba(139, 90, 43, 0.25);
      }

      .frame::before,
      .frame::after {
        content: "";
        position: absolute;
        inset: -0.35rem;
        border-radius: 2.2rem;
        border: 3px solid transparent;
      }

      .frame::before {
        border-top-color: white;
        border-left-color: white;
      }

      .frame::after {
        border-right-color: white;
        border-bottom-color: white;
      }
    </style>
  </head>
  <body>
    <div id="container"></div>

    <div class="start-gate" id="startGate">
      <div class="start-gate__card">
        <h1>Haz clic para iniciar la cámara</h1>
        <p id="startGateCopy">Prepara el target del pabellón para comenzar la experiencia.</p>
        <button id="startExperienceBtn" class="start-gate__button" type="button">
          Iniciar experiencia
        </button>
      </div>
    </div>

    <div class="hud">
      <div class="message" id="message">
        <strong>Escaner AR MUDE</strong>
        <span id="messageText">Apunta al target del pabellón.</span>
      </div>
      <div class="frame" aria-hidden="true"></div>
      <div class="controls">
        <button id="mapButton" class="action-button map-button" type="button">¿Cómo llegar?</button>
        <button id="stampButton" class="action-button stamp-button" type="button">Obtener sello</button>
      </div>
    </div>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { MindARThree } from "mindar-image-three";

      const params = new URLSearchParams(window.location.search);
      const pavilionId = Number(params.get("pavilionId") || "1");
      const pavilionName = params.get("name") || "El desierto y su pasado";
      const TARGETS_URL = params.get("targetSrc") || "./assets/ar/targets/targets.mind";
      const MODEL_URL = params.get("modelSrc") || "./assets/ar/models/modelo.glb";
      const MAP_URL = params.get("mapUrl") || "";
      const IMAGE_URL = "./assets/ar/images/mude.png";
      const AUDIO_URL = "./assets/ar/audio/dino.mp3";

      document.title = `Escaner AR ${pavilionName}`;

      const container = document.querySelector("#container");
      const messageText = document.querySelector("#messageText");
      const message = document.querySelector("#message");
      const stampButton = document.querySelector("#stampButton");
      const mapButton = document.querySelector("#mapButton");
      const frame = document.querySelector(".frame");
      const startGate = document.querySelector("#startGate");
      const startGateCopy = document.querySelector("#startGateCopy");
      const startExperienceBtn = document.querySelector("#startExperienceBtn");

      const clock = new THREE.Clock();
      const dinoAudio = new Audio(AUDIO_URL);
      dinoAudio.loop = true;
      dinoAudio.preload = "auto";
      dinoAudio.muted = true;
      dinoAudio.playsInline = true;
      dinoAudio.load();

      let mindarThree;
      let renderer;
      let scene;
      let camera;
      let mixer;
      let audioPrimed = false;
      let isStarting = false;

      function setMessage(text) {
        messageText.textContent = text;
      }

      function setButtonState(found) {
        stampButton.classList.toggle("is-visible", found);
        mapButton.classList.toggle("is-visible", found && Boolean(MAP_URL));
      }

      function setScanningState(found) {
        setButtonState(found);

        if (found) {
          message.classList.add("is-hidden");
          frame.classList.add("is-hidden");
          return;
        }

        message.classList.remove("is-hidden");
        frame.classList.remove("is-hidden");
      }

      function reportAudioIssue(context, error) {
        console.warn(`[MUDE audio] ${context}`, error?.name || "", error?.message || "");
      }

      async function primeAudio() {
        if (audioPrimed) {
          return true;
        }

        try {
          await dinoAudio.play();
          dinoAudio.pause();
          dinoAudio.currentTime = 0;
          dinoAudio.muted = false;
          audioPrimed = true;
          return true;
        } catch (error) {
          reportAudioIssue("No se pudo preparar el audio", error);
          dinoAudio.muted = false;
          throw error;
        }
      }

      function unlockAudio() {
        primeAudio().catch(() => {});
      }

      function playDinoAudio() {
        dinoAudio.muted = false;
        dinoAudio.currentTime = 0;
        dinoAudio.play().catch((error) => {
          reportAudioIssue(
            "El navegador bloqueo la reproduccion al detectar el target",
            error
          );
        });
      }

      async function addFloatingImage(anchor, modelRoot) {
        const texture = await new THREE.TextureLoader().loadAsync(IMAGE_URL);
        const sprite = new THREE.Sprite(
          new THREE.SpriteMaterial({
            map: texture,
            transparent: true,
            depthWrite: false,
            depthTest: false,
          })
        );

        const box = new THREE.Box3().setFromObject(modelRoot);
        const size = box.getSize(new THREE.Vector3());
        const center = box.getCenter(new THREE.Vector3());
        const aspect =
          (texture.image?.width || 1) / (texture.image?.height || 1);
        const height = (size.y || 1) * 0.22;

        sprite.scale.set(height * aspect, height, 1);
        sprite.center.set(0.5, 1);
        sprite.position.set(center.x, box.min.y - size.y * 0.06, center.z + 0.01);
        sprite.renderOrder = 999;
        anchor.group.add(sprite);
      }

      async function buildModel(anchor) {
        const gltf = await new GLTFLoader().loadAsync(MODEL_URL);
        const model = gltf.scene;
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const scaleFactor = 2 / (Math.max(size.x, size.y, size.z) || 1);

        model.scale.multiplyScalar(scaleFactor);
        model.updateMatrixWorld(true);

        const scaledBox = new THREE.Box3().setFromObject(model);
        const center = scaledBox.getCenter(new THREE.Vector3());

        model.position.x -= center.x;
        model.position.z -= center.z;
        model.position.y -= center.y + size.y * 0.08;
        model.position.z += 0.03;

        const root = new THREE.Group();
        root.rotation.set(0, 0, 0);
        root.add(model);
        anchor.group.add(root);

        if (gltf.animations?.length) {
          mixer = new THREE.AnimationMixer(model);
          gltf.animations.forEach((clip) => mixer.clipAction(clip).play());
        }

        await addFloatingImage(anchor, root);
      }

      async function startAR() {
        setMessage(`Iniciando camara y cargando ${pavilionName}...`);

        mindarThree = new MindARThree({
          container,
          imageTargetSrc: TARGETS_URL,
          filterMinCF: 0.0001,
          filterBeta: 0.01,
          warmupTolerance: 8,
          missTolerance: 8,
        });

        ({ renderer, scene, camera } = mindarThree);
        renderer.setClearColor(0x000000, 0);

        scene.add(new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1.5));

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(0, 2, 1);
        scene.add(light);

        const anchor = mindarThree.addAnchor(0);

        anchor.onTargetFound = () => {
          setScanningState(true);
          playDinoAudio();
        };

        anchor.onTargetLost = () => {
          setScanningState(false);
          setMessage(`Apunta nuevamente al target de "${pavilionName}".`);
          dinoAudio.pause();
          dinoAudio.currentTime = 0;
        };

        await buildModel(anchor);
        await mindarThree.start();
        setScanningState(false);

        renderer.setAnimationLoop(() => {
          const delta = clock.getDelta();
          if (mixer) mixer.update(delta);
          renderer.render(scene, camera);
        });

        setMessage(`AR activa. Busca el target de "${pavilionName}".`);
      }

      async function stopAR() {
        if (!mindarThree) {
          return;
        }

        mindarThree.stop();
        renderer?.setAnimationLoop(null);
        dinoAudio.pause();
        dinoAudio.currentTime = 0;
      }

      startGateCopy.textContent = `Prepara el target del pabellón "${pavilionName}" para comenzar la experiencia.`;
      setMessage(`Apunta al target del pabellón "${pavilionName}".`);

      stampButton.addEventListener("click", async () => {
        await stopAR();
        window.parent.postMessage(
          { type: "mude-ar-stamp-earned", pavilionId },
          window.location.origin
        );
      });

      mapButton.addEventListener("click", () => {
        if (!MAP_URL) {
          return;
        }

        window.open(MAP_URL, "_blank", "noopener,noreferrer");
      });

      startExperienceBtn.addEventListener("click", async () => {
        if (isStarting) {
          return;
        }

        isStarting = true;
        startExperienceBtn.disabled = true;
        startExperienceBtn.textContent = "Abriendo cámara...";

        try {
          await primeAudio();
          await startAR();
          startGate.classList.add("is-hidden");
        } catch (error) {
          console.error(error);
          if (error?.name === "NotReadableError") {
            setMessage(
              "La cámara está en uso por otra aplicación o pestaña. Cierra la otra cámara e intenta de nuevo."
            );
          } else {
            setMessage("No se pudo iniciar la experiencia AR. Revisa permisos de cámara.");
          }
        } finally {
          isStarting = false;
          startExperienceBtn.disabled = false;
          startExperienceBtn.textContent = "Iniciar experiencia";
        }
      });

      window.addEventListener("pointerdown", unlockAudio, { once: true });
      window.addEventListener("touchstart", unlockAudio, { once: true });
      window.addEventListener("beforeunload", stopAR);
    </script>
  </body>
</html>
